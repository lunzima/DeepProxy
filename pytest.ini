[pytest]
# 默认仅跑单元测试；集成测试需显式：python -m pytest tests/integration
testpaths = tests
norecursedirs = tests/integration
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
    # LiteLLM 内部 async HTTP handler 在测试中不会被 await，属已知无害行为
    ignore:coroutine 'BaseLLMHTTPHandler.async_completion' was never awaited:RuntimeWarning
